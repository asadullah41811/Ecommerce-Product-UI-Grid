<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Grid</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <link rel="stylesheet" href="product.css" />
  </head>
  <body>
    <section class="products">
      <h1>Featured Products</h1>

      <div class="product-grid">
        <!-- Card 1 -->
        <div class="card">
          <span class="badge">New</span>

          <img
            src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"
            alt=""
          />

          <div class="content">
            <h3>Nike Air Max</h3>

            <div class="stars">★★★★★</div>

            <p>$149</p>

            <button>Add to Cart</button>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
          <span class="badge">Sale</span>

          <img
            src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=600"
            alt=""
          />

          <div class="content">
            <h3>Adidas Sneakers</h3>

            <div class="stars">★★★★☆</div>

            <p>$129</p>

            <button>Add to Cart</button>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="card">
          <span class="badge">Hot</span>

          <img
            src="https://images.unsplash.com/photo-1511556532299-8f662fc26c06?w=600"
            alt=""
          />

          <div class="content">
            <h3>Puma Runner</h3>

            <div class="stars">★★★★★</div>

            <p>$110</p>

            <button>Add to Cart</button>
          </div>
        </div>

        <!-- Card 4 -->
        <div class="card">
          <span class="badge">20% OFF</span>

          <img
            src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=600"
            alt=""
          />

          <div class="content">
            <h3>Jordan Shoes</h3>

            <div class="stars">★★★★★</div>

            <p>$179</p>

            <button>Add to Cart</button>
          </div>
        </div>

        <!-- Card 5 -->
        <div class="card">
            <span class="badge">New in</span>
          <img
            src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600"
            alt=""
          />

          <div class="content">
            <h3>Casual Shoes</h3>

            <div class="stars">★★★★☆</div>

            <p>$99</p>

            <button>Add to Cart</button>
          </div>
        </div>

        <!-- Card 6 -->
        <div class="card">
            <span class="badge">40% OFF</span>
          <img
            src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=600"
            alt=""
          />

          <div class="content">
            <h3>Sports Shoes</h3>

            <div class="stars">★★★★★</div>

            <p>$139</p>

            <button>Add to Cart</button>
          </div>
        </div>

        <!-- Card 7 -->
        <div class="card">
            <span class="badge">10% OFF</span>
          <img
            src="https://images.unsplash.com/photo-1460353581641-37baddab0fa2?w=600"
            alt=""
          />

          <div class="content">
            <h3>Running Shoes</h3>

            <div class="stars">★★★★★</div>

            <p>$159</p>

            <button>Add to Cart</button>
          </div>
        </div>

        <!-- Card 8 -->
        <div class="card">
            <span class="badge">Hot</span>
          <img
            src="https://images.unsplash.com/photo-1543508282-6319a3e2621f?w=600"
            alt=""
          />

          <div class="content">
            <h3>Classic Sneakers</h3>

            <div class="stars">★★★★☆</div>

            <p>$119</p>

            <button>Add to Cart</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
